<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migracion</title>
</head>

<body>
    <script type="module">
        //Instancia la aplicacion de tu proyecto firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        //Trae los modulos necesarios para usar firestore
        import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        //Configuracion para conectar a tu propia base de datos de firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDH0c7TSVuicj6Q-4sAwBRlEAW-I4ViKq4",
            authDomain: "cinestarfire.firebaseapp.com",
            projectId: "cinestarfire",
            storageBucket: "cinestarfire.firebasestorage.app",
            messagingSenderId: "1003868943684",
            appId: "1:1003868943684:web:fda482ad61e4e3f45f1311",
            measurementId: "G-YZ0WX1RYVW"
        };

        // Guardamos la inicializacion de Firebase en la variable app
        const app = initializeApp(firebaseConfig);

        //Obtenemos el servicio de firestore en la constante db
        //Le pasamos la configuracion de la app que creamos arriba
        const db = getFirestore(app);


        const registrarPeliculas = async () => {
            try {
                const peticion = await fetch(`http://localhost/cinestar/cinestar/peliculas`);
                const listaPeliculas = await peticion.json()

                listaPeliculas.data.forEach(peli => {
                    addDoc(collection(db, 'peliculas'), peli)
                })
            } catch (err) {
                alert("Error al traer peliculas locales: Revisa tu XAMPP o la ruta (F12 para más info)");
                console.error(err);
            }
        }


        const registrarCines = async () => {
            try {
                const respuesta = await fetch(`http://localhost/cinestar/cinestar/cines`);
                const listaCines = await respuesta.json()

                listaCines.data.forEach(async elCine => {
                    const reqPelis = await fetch(`http://localhost/cinestar/cinestar/cines/${elCine.id}/peliculas`);
                    elCine.peliculas = (await reqPelis.json()).data

                    const reqTarifas = await fetch(`http://localhost/cinestar/cinestar/cines/${elCine.id}/tarifas`);
                    elCine.tarifas = (await reqTarifas.json()).data
                    
                    addDoc(collection(db, 'cines'), elCine)
                })
            } catch (err) {
                alert("Error al traer cines locales: Revisa tu API y MySQL");
                console.error(err);
            }
        }

        registrarPeliculas()
        registrarCines()
    </script>
</body>

</html>
